services:
  app:
    build:
      context: .
      args:
        APP_NAME: app
    container_name: precatorios-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      - TZ=America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy

  queue:
    build:
      context: .
      args:
        APP_NAME: queue
    container_name: precatorios-queue
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    container_name: precatorios-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
